<!-- Shipping Template -->

<div class="shipping-container">

    <div class="page-header">

        <h2>
            📦 Shipping Calculator
        </h2>

        <p>
            Calculate shipping cost and delivery distance.
        </p>

    </div>

    <div class="shipping-card">

        <div class="shipping-form">

            <div class="form-group">

                <label>

                    🌍 Select Country

                </label>

                <select
                    ng-change="countryChanged();"
                    ng-model="data.selectedCountry"
                    ng-options="opt.name for opt in data.countries track by opt.code">

                </select>

            </div>

            <div class="form-group">

                <label>

                    📍 Enter Location

                </label>

                <input
                    id="location"
                    type="text"
                    placeholder="Enter city or location"
                    ng-model="data.selectedLocation"
                    ng-disabled="data.disableCity"/>

            </div>

            <div class="form-group">

                <button
                    class="calculate-btn"
                    ng-click="calcShipping();"
                    ng-disabled="data.disableCalc">

                    🚚 Calculate Shipping

                </button>

            </div>

        </div>

        <!-- Results -->

        <div
            ng-if="data.shipping"
            class="shipping-result">

            <h3>

                Shipping Estimate

            </h3>

            <div class="shipping-stat">

                <span>

                    Distance

                </span>

                <strong>

                    {{ data.shipping.distance }} km

                </strong>

            </div>

            <div class="shipping-stat">

                <span>

                    Shipping Cost

                </span>

                <strong class="shipping-cost">

                    €{{ data.shipping.cost.toFixed(2) }}

                </strong>

            </div>

            <button
                class="confirm-btn"
                ng-click="confirmShipping();">

                ✅ Confirm Shipping

            </button>

        </div>

    </div>

</div>
