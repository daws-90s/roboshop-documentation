<!-- Login / Register -->

<div class="auth-container">

    <div class="message">
        {{ data.message }}
    </div>

    <!-- Not Logged In -->

    <div
        ng-if="data.user.name === undefined"
        class="auth-grid">

        <!-- Login -->

        <div class="auth-card">

            <h2>
                🔐 Login
            </h2>

            <div class="form-group">

                <label>

                    Username

                </label>

                <input
                    type="text"
                    ng-model="data.name"
                    placeholder="Enter username">

            </div>

            <div class="form-group">

                <label>

                    Password

                </label>

                <input
                    type="password"
                    ng-model="data.password"
                    placeholder="Enter password">

            </div>

            <button
                class="auth-btn"
                ng-click="login();">

                Login

            </button>

        </div>

        <!-- Register -->

        <div class="auth-card">

            <h2>
                👤 Create Account
            </h2>

            <div class="form-group">

                <label>

                    Username

                </label>

                <input
                    type="text"
                    ng-model="data.name"
                    placeholder="Choose username">

            </div>

            <div class="form-group">

                <label>

                    Email

                </label>

                <input
                    type="email"
                    ng-model="data.email"
                    placeholder="Enter email">

            </div>

            <div class="form-group">

                <label>

                    Password

                </label>

                <input
                    type="password"
                    ng-model="data.password"
                    placeholder="Create password">

            </div>

            <div class="form-group">

                <label>

                    Confirm Password

                </label>

                <input
                    type="password"
                    ng-model="data.password2"
                    placeholder="Confirm password">

            </div>

            <button
                class="auth-btn"
                ng-click="register();">

                Register

            </button>

        </div>

    </div>

    <!-- Logged In -->

    <div
        ng-if="data.user.name !== undefined"
        class="profile-page">

        <div class="profile-card">

            <div class="profile-avatar">

                👤

            </div>

            <h2>

                Welcome,
                {{ data.user.name }}

            </h2>

            <p>

                {{ data.user.email }}

            </p>

        </div>

        <!-- Order History -->

        <div class="history-card">

            <h3>
                📦 Order History
            </h3>

            <table class="history-table">

                <thead>

                    <tr>

                        <th>Order ID</th>

                        <th>Items</th>

                        <th>Total</th>

                    </tr>

                </thead>

                <tbody>

                    <tr
                        ng-repeat="hist in data.orderHistory">

                        <td>

                            {{ hist.orderid }}

                        </td>

                        <td>

                            <ul>

                                <li
                                    ng-repeat="item in hist.cart.items">

                                    {{ item.name }}

                                </li>

                            </ul>

                        </td>

                        <td>

                            €{{ hist.cart.total }}

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
