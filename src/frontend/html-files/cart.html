<!-- Shopping Cart -->

<div class="cart-container">

    <div class="page-header">

        <h2>
            🛒 Shopping Cart
        </h2>

        <p>
            Session: {{ data.uniqueid }}
        </p>

    </div>

    <!-- Empty Cart -->

    <div
        ng-if="data.cart.total == 0"
        class="empty-cart">

        <div class="empty-cart-icon">
            🛒
        </div>

        <h3>
            Your cart is empty
        </h3>

        <p>
            Discover amazing robots and start shopping.
        </p>

        <a href="/" class="shop-now-btn">
            Continue Shopping
        </a>

    </div>

    <!-- Cart Items -->

    <div
        ng-if="data.cart.total != 0"
        class="cart-card">

        <table class="cart-table">

            <thead>

            <tr>

                <th>Quantity</th>

                <th>Product</th>

                <th>Subtotal</th>

            </tr>

            </thead>

            <tbody>

            <tr
                ng-repeat="item in data.cart.items">

                <td>

                    <input
                        class="qty-input"
                        type="number"
                        min="0"
                        max="10"
                        ng-model="item.qty"
                        ng-change="change(item.sku, item.qty);" />

                </td>

                <td>

                    <div class="cart-product">

                        <span class="cart-product-name">

                            {{ item.name }}

                        </span>

                    </div>

                </td>

                <td class="currency">

                    €{{ item.subtotal.toFixed(2) }}

                </td>

            </tr>

            </tbody>

        </table>

        <div class="order-summary">

            <div class="summary-row">

                <span>Tax</span>

                <span>

                    €{{ data.cart.tax.toFixed(2) }}

                </span>

            </div>

            <div class="summary-row total-row">

                <span>Total</span>

                <span>

                    €{{ data.cart.total.toFixed(2) }}

                </span>

            </div>

        </div>

        <div class="checkout-section">

            <button
                class="checkout-btn"
                ng-click="buy();">

                🚀 Proceed To Checkout

            </button>

        </div>

    </div>

</div>
