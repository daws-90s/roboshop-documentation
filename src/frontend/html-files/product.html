<!-- Product Details -->

<div class="product-page">

    <div class="message">
        {{ data.message }}
    </div>

    <div class="product-layout">

        <!-- Product Image -->

        <div class="product-gallery">

            <img
                class="product-detail-image"
                src="/images/{{ data.product.sku }}.png"
                alt="{{ data.product.name }}"
                loading="lazy"/>

        </div>

        <!-- Product Information -->

        <div class="product-info">

            <h2 class="product-title">

                {{ data.product.name }}

            </h2>

            <div class="product-price">

                €{{ data.product.price.toFixed(2) }}

            </div>

            <div
                class="stock-badge stock-available"
                ng-if="data.product.instock != 0">

                ✓ In Stock

            </div>

            <div
                class="stock-badge stock-unavailable"
                ng-if="data.product.instock == 0">

                ✗ Out Of Stock

            </div>

            <!-- Rating -->

            <div class="rating-card">

                <h4>
                    Customer Rating
                </h4>

                <div
                    ng-if="data.rating.avg_rating != 0">

                    <span class="rating-score">

                        {{ data.rating.avg_rating.toFixed(1) }}

                    </span>

                    / 5

                    <span class="rating-count">

                        ({{ data.rating.rating_count }} votes)

                    </span>

                </div>

                <div
                    ng-if="data.rating.avg_rating == 0">

                    Be the first to rate this product
                </div>

                <div class="vote-stars">

                    <span
                        ng-repeat="vote in [1,2,3,4,5]">

                        <img
                            id="vote-{{ vote }}"
                            class="vote-star"
                            alt="{{ vote }}"
                            ng-mouseover="glowstan(vote,1.0)"
                            ng-mouseleave="glowstan(vote,0.5)"
                            ng-click="rateProduct(vote)"
                            src="/media/instana_icon_square.png"/>

                    </span>

                </div>

            </div>

            <!-- Description -->

            <div class="product-description">

                <h4>
                    Description
                </h4>

                <p>

                    {{ data.product.description }}

                </p>

            </div>

            <!-- Purchase -->

            <div
                ng-if="data.product.instock != 0"
                class="purchase-card">

                <label>

                    Quantity

                </label>

                <input
                    class="qty-input"
                    type="number"
                    min="1"
                    max="10"
                    ng-model="data.quantity"/>

                <button
                    class="add-cart-btn"
                    ng-click="addToCart()">

                    🛒 Add To Cart

                </button>

            </div>

        </div>

    </div>

</div>
