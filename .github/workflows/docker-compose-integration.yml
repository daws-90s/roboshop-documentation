name: Docker compose Integration workflow

on:
  workflow_call:
    inputs:
      compose_file:
        required: true
        type: string
      repo_name:
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  docker-compose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v6

      # Docker Login
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Compose Environment File
        run: |
          cat > compose/.env.ci <<EOF
          FRONTEND_IMAGE=docker.io/${{ inputs.repo_name }}:frontend-latest
          USER_IMAGE=docker.io/${{ inputs.repo_name }}:user-latest
          CATALOGUE_IMAGE=docker.io/${{ inputs.repo_name }}:catalogue-latest
          CART_IMAGE=docker.io/${{ inputs.repo_name }}:cart-latest
          SHIPPING_IMAGE=docker.io/${{ inputs.repo_name }}:shipping-latest
          PAYMENT_IMAGE=docker.io/${{ inputs.repo_name }}:payment-latest
          EOF
          cat compose/.env.ci

       # Pull Candidate Images
      - name: Pull Candidate Images
        run: |
          docker compose \
            --env-file compose/.env.ci \
            -f ${{ inputs.compose_file }} \
            pull

      # Start Ephemeral Integration Environment
      - name: Start Compose Environment
        run: |
          docker compose --env-file compose/.env.ci -f ${{ inputs.compose_file }} up --wait

      # Show Running Containers
      - name: Show Compose Status
        run: docker compose --env-file compose/.env.ci -f ${{ inputs.compose_file }} ps

      # Run Smoke Tests
      - name: Run Smoke Tests
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh

      # Collect Logs On Failure
      - name: Collect Compose Logs
        if: failure()
        run: |
          docker compose \
            --env-file compose/.env.ci \
            -f ${{ inputs.compose_file }} \
            logs

      # Destroy Ephemeral Environments
      - name: Cleanup Compose Environment
        if: always()
        run: |
          docker compose \
            --env-file compose/.env.ci \
            -f ${{ inputs.compose_file }} \
            down -v
