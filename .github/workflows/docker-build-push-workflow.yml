name: docker build and push

on:
  workflow_call:
    inputs:
      repo_name:
        required: true
        type: string
      service:
        required: true
        type: string
      service_path:
        required: true
        type: string

env:
  SERVICE_PATH: ./src/${{ inputs.service }}

permissions:
  packages: write
  contents: read

concurrency:
  group: docker-${{ inputs.service }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    steps:
      - name: checkout the code
        uses: actions/checkout@v6
      # docker metadata
      - name: Extract docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/${{ inputs.repo_name }}
          tags: |
            type=ref,event=pr,prefix=pr-
            type=raw,value=${{ inputs.service }}-latest,enable={{is_default_branch}}

      - name: Debug Metadata
        run: |
          echo "TAGS:"
          echo '${{ steps.meta.outputs.tags }}'

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Build docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.SERVICE_PATH }}
          push: false
          outputs: type=docker,dest=/tmp/${{ inputs.service }}.tar
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.service }}
          cache-to: type=gha,mode=min,scope=${{ inputs.service }}

      # scan the filesytem for vulnerabilities
      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ env.SERVICE_PATH }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: /tmp/${{ inputs.service }}.tar
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          scanners: vuln

      # Load OCI Image
      - name: Load OCI Image
        run: |
          docker load --input /tmp/${{ inputs.service }}.tar

      # Docker Login
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Push Docker Image
      - name: Push Docker Images
        run: |
          while read tag; do
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"








